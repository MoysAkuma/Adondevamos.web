<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Update Place</title>
    <!--Css-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.0/font/bootstrap-icons.min.css" integrity="sha512-rDTlSC+d3sQQeTwkSYI7grcqLTrDZjOEEddzt/7IRA+9Q7x1Zud4j++lH29VSlNrTI0RZ/9d45X6qrFK0RD94w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--JS-->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
  </head>
  <body>
    <div class="container" id="form">
      <h2>¿A donde vamos?</h2>
      <form>
        <!--Place Name-->
        <div class="row mb-3">
          <label for="txtPlaceName" class="col-sm-2 col-form-label">Place Name</label>
          <div class="col-sm-10">
            <input id="txtPlaceName" type="text" class="form-control" placeholder="Place Name" aria-label="Trip Name">
          </div>
        </div>
        <!--Country-->
        <div class="row mb-3">
          <label for="cmbCountry" class="col-sm-2 col-form-label">Country</label>
          <div class="col-sm-10">
            <div class="input-group mb-3">
              <select class="form-select" aria-label="Country">
                <option selected>MEX</option>
                <option value="1">JAP</option>
                <option value="2">USA</option>
              </select>
            </div>
          </div>
        </div>
        <!--State-->
        <div class="row mb-3">
          <label for="cmbState" class="col-sm-2 col-form-label">State</label>
          <div class="col-sm-10">
            <div class="input-group mb-3">
              <select class="form-select" aria-label="State">
                <option selected>Op 1</option>
                <option value="1">Op 2</option>
                <option value="2">Op 3</option>
              </select>
            </div>
          </div>
        </div>

        <!--City-->
        <div class="row mb-3">
          <label for="cmbCity" class="col-sm-2 col-form-label">City</label>
          <div class="col-sm-10">
            <div class="input-group mb-3">
              <select class="form-select" aria-label="City">
                <option selected>Op 1</option>
                <option value="1">Op 2</option>
                <option value="2">Op 3</option>
              </select>
            </div>
          </div>
        </div>

        <!--Address-->
        <div class="row mb-3">
          <label for="txtPlaceName" class="col-sm-2 col-form-label">Address</label>
            <div class="col-sm-10">
              <input id="txtPlaceName" type="text" class="form-control" placeholder="Address" aria-label="Address">
            </div>
        </div>

        <!--Description-->
        <div class="row mb-3">
          <label for="txtDescription" class="col-sm-2 col-form-label">Description</label>
            <div class="col-sm-10">
              <input id="txtDescription" type="text" class="form-control" placeholder="Description" aria-label="Description">
            </div>
        </div>

        <!--Facilities-->
        <div class="row mb-3">
          <label for="txtFacilities" class="col-sm-2 col-form-label">Facilities</label>
            <div class="col-sm-10">
              <ul class="list-group">
                <li class="list-group-item">
                  <input class="form-check-input me-1" type="checkbox" value="{facilities[n].Value}" id="cbop1">
                  <label class="form-check-label" for="firstCheckbox">{facilities[n].Name}</label>
                </li>
                <li class="list-group-item">
                  <input class="form-check-input me-1" type="checkbox" value="{facilities[n].Value}" id="cbop1">
                  <label class="form-check-label" for="firstCheckbox">{facilities[n].Name}</label>
                </li>
                <li class="list-group-item">
                  <input class="form-check-input me-1" type="checkbox" value="{facilities[n].Value}" id="cbop1">
                  <label class="form-check-label" for="firstCheckbox">{facilities[n].Name}</label>
                </li>
              </ul>
            </div>
        </div>
        <div class="row mb-3">
          <div class="col-sm-10 offset-sm-2">
            <button type="submit" class="btn btn-primary">Create Place</button>
          </div>
        </div>
      </form>
    </div>
    <script type="text/babel">
    
      function MyApp() {
        return <h1>Update Place</h1>;
      }

      const container = document.getElementById('root');
      const root = ReactDOM.createRoot(container);
      root.render(<MyApp />);

    </script>

      Note: this page is a great way to try React but it's not suitable for production.
      It slowly compiles JSX with Babel in the browser and uses a large development build of React.

      https://react.dev/learn/start-a-new-react-project

      Read this page for adding React with JSX to an existing project:
      https://react.dev/learn/add-react-to-an-existing-project
    -->
  </body>
</html>
