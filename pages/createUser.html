<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Create User</title>
    <!--Css-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.0/font/bootstrap-icons.min.css" integrity="sha512-rDTlSC+d3sQQeTwkSYI7grcqLTrDZjOEEddzt/7IRA+9Q7x1Zud4j++lH29VSlNrTI0RZ/9d45X6qrFK0RD94w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- Don't use this in production: -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <div class="container" id="form">
      <form>
        <!--User Tag-->
        <div class="row mb-3">
          <label for="lblUserName" class="col-sm-2 col-form-label">User Tag</label>
          <div class="col-sm-10">
            <input type="text" class="form-control" placeholder="User Name" aria-label="User Name">
          </div>
        </div>

        <!--User Name-->
        <div class="row mb-3">
          <label for="lblUserName" class="col-sm-2 col-form-label">User Name</label>
          <div class="col-sm-10">
            <input type="text" class="form-control" placeholder="User Name" aria-label="User Name">
          </div>
        </div>

        <!--Second Name-->
        <div class="row mb-3">
          <label for="lblLastName" class="col-sm-2 col-form-label">Second Name</label>
          <div class="col-sm-10">
            <input type="text" class="form-control" placeholder="Second Last Name" aria-label="Second Last Name">
          </div>
        </div>

        <!--User Last Name-->
        <div class="row mb-3">
          <label for="lblLastName" class="col-sm-2 col-form-label">Last Name</label>
          <div class="col-sm-10">
            <input type="text" class="form-control" placeholder="Last Name" aria-label="Last Name">
          </div>
        </div>

        <!--User Second Last Name-->
        <div class="row mb-3">
          <label for="lblLastName" class="col-sm-2 col-form-label">Second Last Name</label>
          <div class="col-sm-10">
            <input type="text" class="form-control" placeholder="Second Last Name" aria-label="Second Last Name">
          </div>
        </div>

        <!--Email-->
        <div class="row mb-3">
          <label for="lblEmail" class="col-sm-2 col-form-label">Email</label>
          <div class="col-sm-10">
            <input type="text" class="form-control" placeholder="email" aria-label="email">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-sm-10 offset-sm-2">
            <button type="submit" class="btn btn-primary">Create User</button>
          </div>
        </div>

      </form>
    </div>
    <script type="text/babel">
    
      function MyApp() {
        return <h1>Create User</h1>;
      }

      const container = document.getElementById('root');
      const root = ReactDOM.createRoot(container);
      root.render(<MyApp />);

    </script>
    <!--
      Note: this page is a great way to try React but it's not suitable for production.
      It slowly compiles JSX with Babel in the browser and uses a large development build of React.

      Read this page for starting a new React project with JSX:
      https://react.dev/learn/start-a-new-react-project

      Read this page for adding React with JSX to an existing project:
      https://react.dev/learn/add-react-to-an-existing-project
    -->
  </body>
</html>
